<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheet-Log</title>
    <link rel="icon" href="flogo.jpg" type="image/png" />
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>
    <style>
      .form-container {
        max-width: 500px;
        margin: auto;
        margin-top: 50px;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        background-color: #fff;
      }
      .subbtn{
        margin-top: 20px;
        width: 30%;
        background: #004d87;
        margin-left: auto;
      }
      .lets{
        color:#004d87;
      }
      .labtext{
/*        color:#004d87;
        font-size: 14px;
        font-family: 600;
        */
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container">
      <div class="form-container">
        <h4 class="text-center mb-4 lets">Let's Connect!!!</h4>
        <form id="submit-to-google-sheet">
          <div class="form-group">
            <label for="name" class="labtext">Name:</label>
            <input class="form-control"  type="text" name="name" id="name" placeholder="Your Name" required/>
          </div>
          <div class="form-group">
            <label for="email" class="labtext">Email:</label>
            <input class="form-control" type="email" name="email" id="email" placeholder="Your Email Address" required />
          </div>
          <div class="form-group">
            <label for="slip" class="labtext">Mobile Number:</label>
            <input class="form-control" type="text" name="contact_number" id="contact_number" placeholder="Your Mobile Number"  />
          </div>

          <!-- <div class="form-group">
            <label for="loc">Gender:</label>
            <select class="form-control" name="gender" id="gender" required>
              <option value="" disabled selected hidden>Choose...</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div> -->
          <div class="form-group">
            <label for="loc" class="labtext">Message:</label>
            <textarea class="form-control" name="message" id="message" placeholder="Message(optional)"></textarea>
          <!-- <div class="form-group form-check mt-2">
            <input class="form-check-input" type="checkbox" id="age" />
            <label class="form-check-label" for="age"
              >Check if you are over 18 years old</label
            >
          </div>
          <div class="form-group form-check">
            <input class="form-check-input" type="checkbox" id="ex" required />
            <label class="form-check-label" for="ex"
              >By checking this box I certify that I am agree with the data
              terms and policies.
            </label>
          </div> -->
          <button type="submit" class="btn btn-primary btn-block subbtn" style="margin-top: 20px;">
            Submit
          </button>
        </form>
      </div>
    </div>

    <script>
      const scriptURL = "https://script.google.com/macros/s/AKfycbwE70NnflXJi3vpsW10sV9DuWD8TB04YDcsdEBmYjO6hPCL-c56NYFdylojy1EjbueF/exec";
      const form = document.forms["submit-to-google-sheet"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        var formData = new FormData(form);

        // Show Loader
        swal({
          title: "Submitting...",
          text: "Please wait",
          allowOutsideClick: false,
          onOpen: () => {
            swal.showLoading();
          }
        });

        fetch(scriptURL, { method: "POST", body: formData })
          .then((response) => {
            swal("Done", "Submitted Successfully.", "success");
            form.reset();
          })
          .catch((error) => {
            swal("Error", "Something went wrong. Please try again!", "error");
          });
      });

    </script>
  </body>
</html>
